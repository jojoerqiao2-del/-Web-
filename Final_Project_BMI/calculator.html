<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator - MyBody Index</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">MyBody Index</div>
        <div class="menu">
            <a href="index.html">Home</a>
            <a href="calculator.html">Calculator</a>
             <a href="history.html">History</a>
            <a href="tips.html">Health Tips</a>
        </div>
    </nav>

    <br>

    <main>
        <div class="card-container">
            <h2 style="color: #2E7D32;">BMI Calculator</h2>
            
            <p style="color: #666; font-size: 14px; margin-bottom: 25px;">
                Please enter your height and weight below (Metric System).
            </p>

            <div style="text-align: left;">
                <label for="height" style="font-weight: 600; color: #444;">Height (cm)</label>
                <input type="number" id="height" placeholder="e.g. 175">

                <br> 
                
                <label for="weight" style="font-weight: 600; color: #444;">Weight (kg)</label>
                <input type="number" id="weight" placeholder="e.g. 70">
            </div>

            <button class="btn" onclick="calculateBMI()" style="width: 100%; margin-top: 10px;">Calculate Now</button>

            <div id="result" style="display: none; margin-top: 40px; border-top: 1px solid #eee; padding-top: 30px;">
                <p style="font-size: 14px; color: #888; margin: 0;">Your BMI is</p>
                <h1 id="bmi-value" style="font-size: 48px; color: #2E7D32; margin: 5px 0;">--</h1>
                <p style="font-size: 18px; font-weight: 600; color: #555;">Status: <span id="bmi-status">--</span></p>

                <div class="bmi-chart-container">
                    <div id="bmi-marker" class="marker">&#9660;</div>
                    
                    <div class="bmi-bar">
                        <div class="segment underweight"></div>
                        <div class="segment normal"></div>
                        <div class="segment overweight"></div>
                        <div class="segment obese"></div>
                    </div>
                    
                    <div class="bmi-labels">
                        <span style="left: 0%">15</span>
                        <span style="left: 17.5%">18.5</span>
                        <span style="left: 40%">23</span>
                        <span style="left: 62.5%">27.5</span>
                        <span style="right: 0%">35</span>
                    </div>
                </div>
            </div>
        </div>
       
    </main>

    <br>

    <footer>
        <p>Created by: <strong>[Ren Wenjie]</strong> | Student ID: <strong>[CST2209158]</strong></p>
        <p>Last Edited: December 2025 | Sources: WHO, NHS</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
